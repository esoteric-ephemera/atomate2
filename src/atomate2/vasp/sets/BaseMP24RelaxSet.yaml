# Default VASP settings for calculations in the Materials Project
# using the Regularized-Restored Strongly Constrained and Appropriately
# Normed functional (r2SCAN).
INCAR:
  ALGO: ALL
  EDIFF: 1.e-05
  EDIFFG: -0.02
  ENAUG: 1360
  ENCUT: 680
  IBRION: 2
  ISIF: 3
  ISMEAR: 0 # included to have some reasonable default
  ISPIN: 2
  KSPACING: 0.22 # included to have some reasonable default
  LAECHG: True
  LASPH: True
  LDAU: true
  LDAUJ:
    F:
      Co: 0
      Cr: 0
      Fe: 0
      Mn: 0
      Mo: 0
      Ni: 0
      V: 0
      W: 0
    O:
      Co: 0
      Cr: 0
      Fe: 0
      Mn: 0
      Mo: 0
      Ni: 0
      V: 0
      W: 0
  LDAUL:
    F:
      Co: 2
      Cr: 2
      F: 1
      Fe: 2
      Mn: 2
      Mo: 2
      Ni: 2
      V: 2
      W: 2
    O:
      Co: 2
      Cr: 2
      Fe: 2
      Mn: 2
      Mo: 2
      Ni: 2
      O: 1
      V: 2
      W: 2
  LDAUTYPE: 2
  LDAUU:
    F:
      Co: 0.0
      Cr: 0.0
      F: 0.0
      Fe: 0.0
      Mn: 0.0
      Mo: 0.0
      Ni: 0.0
      V: 0.0
      W: 0.0
    O:
      Co: 0.0
      Cr: 0.0
      Fe: 0.0
      Mn: 0.0
      Mo: 0.0
      Ni: 0.0
      O: 0.0
      V: 0.0
      W: 0.0
  LDAUPRINT: 1
  LCHARG: True
  LELF: False # LELF = True restricts calculation to KPAR = 1
  LMAXMIX: 6
  LMIXTAU: True
  LORBIT: 11
  LREAL: False
  LVTOT: True
  LWAVE: False
  METAGGA: R2SCAN
  NELM: 200
  NSW: 99
  PREC: Accurate
  SIGMA: 0.05 # included to have some reasonable default
  MAGMOM:
    Ce: 5
    Ce3+: 1
    Co: 0.6
    Co3+: 0.6
    Co4+: 1
    Cr: 5
    Dy3+: 5
    Er3+: 3
    Eu: 10
    Eu2+: 7
    Eu3+: 6
    Fe: 5
    Gd3+: 7
